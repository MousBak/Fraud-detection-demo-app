# ═══════════════════════════════════════════════════════════
# Docker Compose — FiFAR Fraud Detection System
# ═══════════════════════════════════════════════════════════
# Orchestre les services backend et frontend pour le développement.
# Usage : docker-compose up --build

version: '3.9'

services:
  # ── Backend API (FastAPI) ──
  # Sert l'API REST sur le port 8000
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fifar-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./backend/data:/app/backend/data
    environment:
      - DEBUG=true
      - PYTHONPATH=/app/backend
      - API_HOST=0.0.0.0
      - API_PORT=8000
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── Frontend (Vite Dev Server) ──
  # Sert le dashboard React sur le port 5173
  frontend:
    image: node:20-alpine
    container_name: fifar-frontend
    working_dir: /app/frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    environment:
      - VITE_API_URL=http://backend:8000/api/v1
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
    driver: local
